name: Aktualizace dat z ENTSO-E

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Stahni repozitar
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaluj zavislosti
        run: pip install entsoe-py pandas pyarrow python-dotenv

      - name: Stahni data z ENTSO-E
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: python fetch_data.py

      - name: Uloz data do repozitare
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/cache/
          git diff --staged --quiet || git commit -m "Automaticka aktualizace dat $(date -u '+%Y-%m-%d')"
          git push
